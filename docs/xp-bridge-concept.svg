<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="valuesGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="principlesGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="practicesGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="320" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">XP: Values, Principles &amp; Practices</text>

  <!-- === Values layer (top) === -->
  <rect x="160" y="56" width="280" height="48" rx="8" fill="url(#valuesGrad)" filter="url(#shadow)"/>
  <text x="300" y="76" text-anchor="middle" font-size="11" font-weight="600" fill="rgba(255,255,255,0.8)">VALUES</text>
  <text x="300" y="93" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.9)">Communication · Simplicity · Feedback · Courage · Respect</text>

  <!-- Bridge pillars: Values ↔ Principles -->
  <line x1="220" y1="104" x2="220" y2="140" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="300" y1="104" x2="300" y2="140" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="380" y1="104" x2="380" y2="140" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Bridge label -->
  <text x="475" y="130" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">bridge</text>
  <path d="M448,125 C455,118 495,118 502,125" fill="none" stroke="#94a3b8" stroke-width="1"/>

  <!-- === Principles layer (middle) === -->
  <rect x="100" y="140" width="400" height="48" rx="8" fill="url(#principlesGrad)" filter="url(#shadow)"/>
  <text x="300" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="rgba(255,255,255,0.8)">PRINCIPLES</text>
  <text x="300" y="177" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">Humanity · Economics · Mutual Benefit · Improvement · Diversity · Reflection · Flow · Opportunity · ...</text>

  <!-- Bridge pillars: Principles ↔ Practices -->
  <line x1="180" y1="188" x2="180" y2="224" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="260" y1="188" x2="260" y2="224" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="340" y1="188" x2="340" y2="224" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="420" y1="188" x2="420" y2="224" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Bridge label -->
  <text x="530" y="214" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">bridge</text>
  <path d="M508,209 C515,202 545,202 552,209" fill="none" stroke="#94a3b8" stroke-width="1"/>

  <!-- === Practices layer (bottom) === -->
  <rect x="40" y="224" width="520" height="48" rx="8" fill="url(#practicesGrad)" filter="url(#shadow)"/>
  <text x="300" y="244" text-anchor="middle" font-size="11" font-weight="600" fill="rgba(255,255,255,0.8)">PRACTICES</text>
  <text x="300" y="261" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">Pair Programming · TDD · CI · Refactoring · Small Releases · Planning Game · Collective Ownership · ...</text>

  <!-- Caption -->
  <text x="300" y="296" text-anchor="middle" font-size="10" fill="#475569">Principles <tspan font-style="italic">bridge</tspan> the gap between abstract values and concrete practices.</text>
  <text x="300" y="312" text-anchor="middle" font-size="9" fill="#94a3b8">Based on Kent Beck, "Extreme Programming Explained" 2nd ed. (2004)</text>
</svg>
